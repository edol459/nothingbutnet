<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — ydkball</title>
<link rel="icon" type="image/png" href="/logo.png">
<link rel="apple-touch-icon" href="/logo.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink:    #0c0c0d;
  --ink2:   #2a2a2e;
  --ink3:   #6b6b78;
  --ink4:   #a8a8b3;
  --paper:  #F5F0E8;
  --paper2: #eeecea;
  --paper3: #e5e2dc;
  --rule:   #d8d5cf;
  --orange: #e8530a;
  --red:    #c0392b;
  --green:  #00C030;
  --ff-serif: 'DM Serif Display', Georgia, serif;
  --ff-sans:  'Instrument Sans', sans-serif;
  --ff-mono:  'DM Mono', monospace;
  --nav-h: 56px;
}
body {
  font-family: var(--ff-sans);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
nav {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: var(--paper);
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center;
  padding: 0 24px; gap: 20px; z-index: 100;
}
.nav-wordmark {
  font-family: var(--ff-serif); font-size: 20px;
  color: var(--ink); letter-spacing: -0.01em;
  text-decoration: none; flex-shrink: 0;
}
.nav-wordmark em { font-style: italic; color: var(--orange); }
.nav-badge {
  font-family: var(--ff-mono); font-size: 10px;
  letter-spacing: 0.08em; text-transform: uppercase;
  background: var(--red); color: #fff;
  padding: 2px 8px; border-radius: 3px;
}
.nav-back {
  font-family: var(--ff-mono); font-size: 11px;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--ink3); text-decoration: none;
  margin-left: auto;
  transition: color 0.15s;
}
.nav-back:hover { color: var(--ink); }

.page {
  padding-top: calc(var(--nav-h) + 32px);
  max-width: 1000px;
  margin: 0 auto;
  padding-left: 24px; padding-right: 24px;
  padding-bottom: 80px;
}

/* ── Header ── */
.page-header { margin-bottom: 28px; }
.page-title {
  font-family: var(--ff-serif);
  font-size: 2rem; letter-spacing: -0.02em;
  color: var(--ink); margin-bottom: 4px;
}
.page-sub { font-size: 13px; color: var(--ink3); }

/* ── Stats row ── */
.stats-row {
  display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap;
}
.stat-chip {
  background: #fff; border: 1px solid var(--rule);
  border-radius: 6px; padding: 12px 18px;
  display: flex; flex-direction: column; gap: 2px;
  min-width: 120px;
}
.stat-chip-val {
  font-family: var(--ff-serif); font-size: 1.6rem;
  color: var(--ink); line-height: 1;
}
.stat-chip-lbl {
  font-family: var(--ff-mono); font-size: 10px;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--ink3);
}

/* ── Search ── */
.search-row {
  display: flex; gap: 10px; margin-bottom: 20px; align-items: center;
}
.search-input {
  flex: 1; font-family: var(--ff-sans); font-size: 13px;
  padding: 8px 12px; background: #fff;
  border: 1px solid var(--rule); border-radius: 4px;
  outline: none; color: var(--ink);
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--orange); }
.search-input::placeholder { color: var(--ink4); }
.btn-search {
  font-family: var(--ff-mono); font-size: 11px;
  letter-spacing: 0.05em; text-transform: uppercase;
  padding: 8px 16px; background: var(--orange); color: #fff;
  border: none; border-radius: 4px; cursor: pointer;
  transition: opacity 0.15s;
}
.btn-search:hover { opacity: 0.85; }

/* ── Table ── */
.review-table { width: 100%; border-collapse: collapse; }
.review-table th {
  font-family: var(--ff-mono); font-size: 10px;
  letter-spacing: 0.07em; text-transform: uppercase;
  color: var(--ink3); text-align: left;
  padding: 8px 10px;
  border-bottom: 1px solid var(--rule);
  white-space: nowrap;
}
.review-table td {
  padding: 12px 10px;
  border-bottom: 1px solid var(--paper3);
  vertical-align: top;
  font-size: 13px;
  color: var(--ink2);
}
.review-table tr:hover td { background: #fff; }

.td-game {
  font-family: var(--ff-mono); font-size: 11px;
  white-space: nowrap;
}
.td-user { font-weight: 500; color: var(--ink); }
.td-email { font-family: var(--ff-mono); font-size: 10px; color: var(--ink3); }
.td-stars { color: var(--green); font-size: 12px; white-space: nowrap; }
.td-text {
  max-width: 320px; font-size: 12px; color: var(--ink2);
  line-height: 1.45;
}
.td-text.empty { color: var(--ink4); font-style: italic; }
.td-date { font-family: var(--ff-mono); font-size: 10px; color: var(--ink3); white-space: nowrap; }
.btn-delete {
  font-family: var(--ff-mono); font-size: 10px;
  letter-spacing: 0.04em; text-transform: uppercase;
  padding: 4px 10px; background: none;
  border: 1px solid #e0b0b0; border-radius: 3px;
  color: var(--red); cursor: pointer;
  transition: background 0.15s, color 0.15s;
  white-space: nowrap;
}
.btn-delete:hover { background: var(--red); color: #fff; border-color: var(--red); }

.table-state {
  font-family: var(--ff-mono); font-size: 12px;
  color: var(--ink3); padding: 32px 0; text-align: center;
}
.btn-more {
  display: block; width: 100%; margin-top: 16px;
  padding: 10px; font-family: var(--ff-mono); font-size: 11px;
  letter-spacing: 0.05em; text-transform: uppercase;
  color: var(--ink3); background: none;
  border: 1px solid var(--rule); border-radius: 4px;
  cursor: pointer; transition: border-color 0.15s, color 0.15s;
}
.btn-more:hover { border-color: var(--orange); color: var(--orange); }

/* ── Access denied ── */
.denied {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 50vh; gap: 12px;
  text-align: center;
}
.denied h2 { font-family: var(--ff-serif); font-size: 1.8rem; }
.denied p { font-size: 14px; color: var(--ink3); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--ink); color: #fff;
  font-size: 13px; padding: 9px 16px;
  border-radius: 4px; z-index: 999;
  font-family: var(--ff-sans);
  animation: toastIn 0.2s ease;
}
@keyframes toastIn {
  from { opacity:0; transform:translateY(6px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── Tabs ── */
.nav-tabs { display: flex; gap: 4px; margin-left: 16px; }
.nav-tab {
  font-family: var(--ff-mono); font-size: 11px;
  letter-spacing: 0.05em; text-transform: uppercase;
  color: var(--ink3); text-decoration: none;
  padding: 6px 12px; border-radius: 4px; cursor: pointer;
  background: none; border: none; transition: color .15s, background .15s;
}
.nav-tab:hover { color: var(--ink); }
.nav-tab.active { color: var(--orange); background: var(--paper3); }

/* ── Insights ── */
.banner {
  border-radius: 6px; padding: 12px 16px; margin-bottom: 24px;
  font-size: 14px; font-weight: 500; border: 1px solid;
}
.banner.OK   { background:#eafaef; border-color:#a8e0ba; color:#1a7a36; }
.banner.WARN { background:#fdf6e3; border-color:#e8d59a; color:#9a7508; }
.banner.FAIL { background:#fdecea; border-color:#f0b8b0; color:var(--red); }

.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; margin-bottom:28px; }
.panel { background:#fff; border:1px solid var(--rule); border-radius:8px; padding:18px; }
.panel h3 {
  font-family: var(--ff-mono); font-size:10px; letter-spacing:.07em;
  text-transform:uppercase; color:var(--ink3); margin-bottom:10px; font-weight:500;
}
.big { font-family:var(--ff-serif); font-size:2rem; line-height:1; color:var(--ink); }
.panel .sub { font-size:12px; color:var(--ink3); margin-top:6px; }

.pill {
  display:inline-block; padding:2px 8px; border-radius:3px;
  font-family:var(--ff-mono); font-size:9px; font-weight:500;
  letter-spacing:.05em; text-transform:uppercase;
}
.pill.OK{background:#eafaef;color:#1a7a36} .pill.WARN{background:#fdf6e3;color:#9a7508}
.pill.FAIL{background:#fdecea;color:var(--red)} .pill.INFO{background:var(--paper3);color:var(--ink3)}

.todo-item { display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--paper3); }
.todo-item:last-child { border-bottom:none; }
.todo-item .tname { font-weight:600; font-size:13px; color:var(--ink); }
.todo-item .tdetail { font-size:12px; color:var(--ink3); margin-top:2px; }

.spark { display:flex; align-items:flex-end; gap:3px; height:44px; margin-top:10px; }
.spark span { flex:1; background:var(--orange); border-radius:2px 2px 0 0; min-height:2px; opacity:.85; }
.bar { display:flex; align-items:center; gap:8px; margin:6px 0; font-size:12px; }
.bar .blabel { width:120px; color:var(--ink3); text-transform:capitalize; }
.bar .btrack { flex:1; height:7px; background:var(--paper3); border-radius:4px; overflow:hidden; }
.bar .bfill { height:100%; background:var(--orange); }
.bar .bval { width:48px; text-align:right; font-family:var(--ff-mono); }
.section-label {
  font-family:var(--ff-mono); font-size:10px; letter-spacing:.07em;
  text-transform:uppercase; color:var(--ink3); margin:24px 0 12px;
}
.checkrow { display:flex; gap:8px; align-items:baseline; padding:7px 0; font-size:13px; border-bottom:1px solid var(--paper3); }
.checkrow:last-child { border-bottom:none; }

/* ── Mobile ──────────────────────────────────────────────────── */
@media (max-width: 640px) {
  nav { padding: 0 16px; gap: 10px; flex-wrap: wrap; }
  .page { padding-left: 16px; padding-right: 16px; }
  .page-title { font-size: 1.5rem; }
  .nav-tabs { margin-left: 0; }
}
</style>
</head>
<body>

<nav>
  <a class="nav-wordmark" href="/"><em>n</em>othingbutnet</a>
  <span class="nav-badge">Admin</span>
  <div class="nav-tabs" id="nav-tabs" style="display:none">
    <button class="nav-tab active" data-tab="insights" onclick="showTab('insights')">Insights</button>
    <button class="nav-tab" data-tab="moderation" onclick="showTab('moderation')">Moderation</button>
  </div>
  <a class="nav-back" href="/">← Back to site</a>
</nav>

<div class="page" id="page">
  <div class="table-state">Checking access…</div>
</div>

<script>
const API = '';

// ── Utils ─────────────────────────────────────────────────────
function fmtDate(str) {
  if (!str) return '';
  const d = new Date(str);
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' })
    + ' ' + d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
}
function starsText(rating) {
  const full = Math.round(rating / 2);
  return '★'.repeat(full) + '☆'.repeat(5 - full) + ` (${(rating/2).toFixed(1)})`;
}
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2600);
}

// ── State ─────────────────────────────────────────────────────
let offset = 0;
let total  = 0;
let query  = '';
let loading = false;
let insightsTimer = null;

// ── Tab router ────────────────────────────────────────────────
function showTab(tab) {
  document.querySelectorAll('.nav-tab').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === tab));
  if (insightsTimer) { clearInterval(insightsTimer); insightsTimer = null; }
  if (tab === 'insights') {
    renderInsights();
    insightsTimer = setInterval(renderInsights, 60000);  // live refresh
  } else {
    renderPage();
  }
}

// ── Insights dashboard ────────────────────────────────────────
const el = (h) => { const t=document.createElement('template'); t.innerHTML=h.trim(); return t.content.firstChild; };
const nfmt = (x) => (x==null ? '—' : Number(x).toLocaleString());

async function renderInsights() {
  const page = document.getElementById('page');
  try {
    const res = await fetch('/api/admin/dashboard', { credentials:'include' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    const h = d.health, g = d.growth, e = d.engagement, rev = d.revenue;

    const headline = { OK:'All systems healthy — data is fresh and complete.',
      WARN:`Mostly healthy — ${h.n_warn} item(s) to watch.`,
      FAIL:`Attention needed — ${h.n_fail} failure(s), ${h.n_warn} warning(s).` }[h.overall];

    page.innerHTML = `
      <div class="page-header">
        <h1 class="page-title">Insights</h1>
        <p class="page-sub">Live as of ${d.generated_at} · auto-refreshes each minute</p>
      </div>
      <div class="banner ${h.overall}">${headline}</div>

      <div class="grid">
        ${kpi('Total Users', nfmt(g.total_users), `+${nfmt(g.new_today)} today · +${nfmt(g.new_7d)} / 7d`)}
        ${kpi('Active (7d)', nfmt(e.active_7d), `${nfmt(e.active_1d)} active today`)}
        ${kpi('Pro Subscribers', nfmt(rev.pro_users), `~$${nfmt(rev.est_mrr)}/mo est. MRR`)}
        ${kpi('Game Plays (7d)', nfmt((e.hol_plays_7d||0)+(e.guesswho_plays_7d||0)),
              `HoL ${nfmt(e.hol_plays_7d)} · GuessWho ${nfmt(e.guesswho_plays_7d)}`)}
      </div>

      <div class="section-label">To-Do / Needs Attention</div>
      <div class="panel" id="ins-todos"></div>

      <div class="section-label">Growth & Engagement</div>
      <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr))">
        <div class="panel" id="ins-signups"></div>
        <div class="panel" id="ins-events"></div>
      </div>

      <div class="section-label">Data Health — Full Checks</div>
      <div id="ins-health"></div>
    `;

    // to-dos
    const todo = document.getElementById('ins-todos');
    if (!h.todos.length) todo.appendChild(el('<div class="sub" style="color:var(--ink3)">Nothing — everything passed ✨</div>'));
    h.todos.forEach(t => todo.appendChild(el(
      `<div class="todo-item"><span class="pill ${t.status}">${t.status}</span>
        <div><div class="tname">${t.section}: ${t.name}</div>
        <div class="tdetail">${t.detail}</div></div></div>`)));

    // signups sparkline
    const sp = document.getElementById('ins-signups');
    sp.appendChild(el('<h3>Signups · last 14 days</h3>'));
    const max = Math.max(1, ...g.signups_daily.map(x=>x.count));
    sp.appendChild(el('<div class="spark">' +
      (g.signups_daily.map(x=>`<span style="height:${Math.round(100*x.count/max)}%" title="${x.date}: ${x.count}"></span>`).join('') || '<span></span>') +
      '</div>'));
    sp.appendChild(el(`<div class="sub">+${nfmt(g.new_30d)} in last 30 days</div>`));

    // events breakdown
    const ev = document.getElementById('ins-events');
    ev.appendChild(el('<h3>Events · last 30 days</h3>'));
    const emax = Math.max(1, ...e.events_30d.map(x=>x.count));
    e.events_30d.slice(0,7).forEach(x => ev.appendChild(el(
      `<div class="bar"><span class="blabel">${x.type.replace(/_/g,' ')}</span>
        <span class="btrack"><span class="bfill" style="width:${Math.round(100*x.count/emax)}%"></span></span>
        <span class="bval">${nfmt(x.count)}</span></div>`)));
    if (!e.events_30d.length) ev.appendChild(el('<div class="sub">No events in window.</div>'));

    // full health checks
    const hc = document.getElementById('ins-health');
    h.sections.forEach(s => {
      const card = el(`<div class="panel" style="margin-bottom:14px"><h3>${s.name}</h3></div>`);
      s.checks.forEach(c => card.appendChild(el(
        `<div class="checkrow"><span class="pill ${c.status}">${c.status}</span>
          <span><b>${c.name}</b> — <span style="color:var(--ink3)">${c.detail}</span></span></div>`)));
      hc.appendChild(card);
    });
  } catch(err) {
    page.innerHTML = `<div class="banner FAIL">Failed to load insights: ${err.message}</div>`;
  }
}

function kpi(title, val, sub) {
  return `<div class="panel"><h3>${title}</h3><div class="big">${val}</div><div class="sub">${sub}</div></div>`;
}

// ── Render admin UI ───────────────────────────────────────────
function renderPage(stats) {
  document.getElementById('page').innerHTML = `
    <div class="page-header">
      <h1 class="page-title">Review Moderation</h1>
      <p class="page-sub">Delete reviews that violate community guidelines. Actions are immediate and irreversible.</p>
    </div>

    <div class="stats-row">
      <div class="stat-chip">
        <div class="stat-chip-val" id="stat-total">—</div>
        <div class="stat-chip-lbl">Total Reviews</div>
      </div>
      <div class="stat-chip">
        <div class="stat-chip-val" id="stat-shown">—</div>
        <div class="stat-chip-lbl">Shown</div>
      </div>
    </div>

    <div class="search-row">
      <input class="search-input" id="search-input" type="text"
        placeholder="Search by reviewer name or review text…"
        value="${query}">
      <button class="btn-search" onclick="doSearch()">Search</button>
    </div>

    <table class="review-table">
      <thead>
        <tr>
          <th>Game</th>
          <th>Reviewer</th>
          <th>Rating</th>
          <th>Review</th>
          <th>Date</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="review-tbody">
        <tr><td colspan="6"><div class="table-state">Loading…</div></td></tr>
      </tbody>
    </table>
    <button class="btn-more" id="btn-more" style="display:none" onclick="loadMore()">Load more</button>
  `;

  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  loadReviews(true);
}

async function loadReviews(reset = false) {
  if (loading) return;
  loading = true;
  if (reset) { offset = 0; }

  const params = new URLSearchParams({ limit: 50, offset, ...(query ? { q: query } : {}) });
  try {
    const res  = await fetch(`/api/admin/reviews?${params}`);
    const data = await res.json();
    total = data.total || 0;
    const reviews = data.reviews || [];

    document.getElementById('stat-total').textContent = total;

    const tbody = document.getElementById('review-tbody');
    if (reset) tbody.innerHTML = '';

    if (reviews.length === 0 && reset) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="table-state">No reviews found.</div></td></tr>`;
    } else {
      reviews.forEach(r => tbody.insertAdjacentHTML('beforeend', reviewRow(r)));
    }

    offset += reviews.length;
    document.getElementById('stat-shown').textContent = offset;
    document.getElementById('btn-more').style.display = data.has_more ? 'block' : 'none';
  } catch(e) {
    toast('Error loading reviews: ' + e.message);
  }
  loading = false;
}

function reviewRow(r) {
  const text = r.review_text
    ? `<span>${r.review_text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>`
    : `<span class="empty">No written review</span>`;
  return `<tr id="row-${r.id}">
    <td class="td-game">
      <div>${r.matchup}</div>
      <div style="color:var(--ink3)">${r.away_score}–${r.home_score}</div>
      <div style="color:var(--ink4)">${r.game_date}</div>
    </td>
    <td>
      <div class="td-user">${r.display_name}</div>
      <div class="td-email">${r.email}</div>
    </td>
    <td class="td-stars">${starsText(r.rating)}</td>
    <td class="td-text">${text}</td>
    <td class="td-date">${fmtDate(r.created_at)}</td>
    <td>
      <button class="btn-delete" onclick="deleteReview(${r.id}, '${r.display_name.replace(/'/g,"\\'")}')">Delete</button>
    </td>
  </tr>`;
}

function doSearch() {
  query = document.getElementById('search-input').value.trim();
  loadReviews(true);
}

function loadMore() {
  loadReviews(false);
}

async function deleteReview(id, name) {
  if (!confirm(`Delete review #${id} by ${name}?\n\nThis cannot be undone.`)) return;
  try {
    const res = await fetch(`/api/admin/reviews/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error((await res.json()).error);
    const row = document.getElementById(`row-${id}`);
    if (row) {
      row.style.opacity = '0.3';
      row.style.transition = 'opacity 0.3s';
      setTimeout(() => row.remove(), 300);
    }
    total--;
    offset--;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-shown').textContent = offset;
    toast(`Review deleted.`);
  } catch(e) {
    toast('Error: ' + e.message);
  }
}

// ── Init: check admin access ──────────────────────────────────
(async () => {
  try {
    const res  = await fetch('/api/admin/check');
    const data = await res.json();
    if (!data.is_admin) {
      document.getElementById('page').innerHTML = `
        <div class="denied">
          <h2>Access Denied</h2>
          <p>You don't have admin privileges.<br>Sign in with an admin account to continue.</p>
          <a href="/auth/google/login?next=/admin" style="margin-top:12px;font-family:var(--ff-mono);font-size:11px;color:var(--orange)">Sign in →</a>
        </div>`;
      return;
    }
    document.getElementById('nav-tabs').style.display = 'flex';
    showTab('insights');
  } catch(e) {
    document.getElementById('page').innerHTML = `<div class="denied"><h2>Error</h2><p>${e.message}</p></div>`;
  }
})();
