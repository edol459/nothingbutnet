<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Impact Board — Stat Reference</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#e8e8e8;font-size:13px;padding:24px}
h1{font-size:18px;font-weight:600;letter-spacing:.04em;margin-bottom:4px;color:#fff}
.subtitle{font-size:12px;color:#555;margin-bottom:20px}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.pill{font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid #2a2a2a;background:#111;color:#777;cursor:pointer;transition:all .15s}
.pill:hover{border-color:#444;color:#ccc}
.pill.active{background:#f97316;color:#fff;border-color:#f97316}
input[type=text]{background:#111;border:1px solid #2a2a2a;color:#e8e8e8;font-size:12px;padding:5px 10px;border-radius:6px;outline:none;width:200px}
input[type=text]:focus{border-color:#444}
input[type=text]::placeholder{color:#444}
.count{font-size:11px;color:#444;margin-left:auto;align-self:center}
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid #1a1a1a}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#0f0f0f;color:#555;font-weight:500;font-size:11px;text-align:left;padding:8px 12px;border-bottom:1px solid #1a1a1a;white-space:nowrap;position:sticky;top:0;z-index:2}
td{padding:8px 12px;border-bottom:1px solid #141414;vertical-align:top;line-height:1.5}
tr:hover td{background:#0f0f0f}
tr.composite td{background:#0d0d0d}
tr.composite:hover td{background:#121212}
tr:last-child td{border-bottom:none}
.cat-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap;display:inline-block;letter-spacing:.03em}
.cat-scoring{background:#3a1a0a;color:#f97316}
.cat-playmaking{background:#0a1a2e;color:#60a5fa}
.cat-defense{background:#0a2018;color:#34d399}
.cat-hustle{background:#2a1a00;color:#fbbf24}
.cat-metrics{background:#1a0a2e;color:#a78bfa}
.stat-name{font-weight:500;color:#e8e8e8;font-size:12.5px}
.sub-text{font-size:11px;color:#555}
.formula{font-family:'SF Mono',Monaco,monospace;font-size:11px;color:#777;line-height:1.7}
.min-req{font-size:11px;color:#555;line-height:1.7}
.tag{font-size:10px;padding:1px 6px;border-radius:4px;border:1px solid #222;color:#555;white-space:nowrap;display:inline-block;margin-top:3px}
.tag-pos{background:#1a1030;color:#a78bfa;border-color:#3a2060}
.tag-lg{background:#0a1828;color:#60a5fa;border-color:#1a3050}
.tag-comp{background:#0a2010;color:#34d399;border-color:#1a4030}
.tag-raw{color:#555;border-color:#1e1e1e}
</style>
</head>
<body>
<h1>The Impact Board — Stat Reference</h1>
<p class="subtitle">All stats, composites, formulas, gates, and normalization methods. Shaded rows = composites. Last updated: 2026-03-21.</p>

<div class="filters">
  <input type="text" id="search" placeholder="Search stats, formulas…">
  <button class="pill active" data-cat="all">All</button>
  <button class="pill" data-cat="scoring">Scoring</button>
  <button class="pill" data-cat="playmaking">Playmaking</button>
  <button class="pill" data-cat="defense">Defense</button>
  <button class="pill" data-cat="hustle">Hustle</button>
  <button class="pill" data-cat="metrics">Metrics</button>
  <button class="pill" data-norm="pos">Pos-normalized</button>
  <button class="pill" data-norm="lg">League-wide</button>
  <button class="pill" data-type="composite">Composites only</button>
  <span class="count" id="count"></span>
</div>

<div class="tbl-wrap">
<table>
<thead><tr>
  <th style="width:90px">Category</th>
  <th style="width:155px">Sub-category</th>
  <th style="width:170px">Stat</th>
  <th>Formula / Description</th>
  <th style="width:250px">Gate / Min requirements</th>
  <th style="width:95px">Normalization</th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>

   min:'No gate. Box Out/75 moved here from Interior Defense composite.'},
  {cat:'hustle',sub:'Rebounding',name:'DREB%',type:'metric',norm:'pos',
   formula:'DREB / (DREB + Opp OREB)',
   min:'1000 min.'},
  {cat:'hustle',sub:'Rebounding',name:'OREB%',type:'metric',norm:'pos',
   formula:'OREB / (OREB + Opp DREB)',
   min:'1000 min.'},
  {cat:'hustle',sub:'Rebounding',name:'Box Out / 75',type:'metric',norm:'pos',
   formula:'(Box Outs / GP) × (75 / Poss/G)',
   min:'Moved from Interior Defense composite.'},
  {cat:'hustle',sub:'Rebounding (extras)',name:'Loose Balls / 75',type:'metric',norm:'pos',
   formula:'(Loose Balls Recovered / GP) × (75 / Poss/G)',
   min:'Display only — factored into Hustle Composite.'},
  {cat:'hustle',sub:'Rebounding (extras)',name:'Box Outs',type:'metric',norm:'pos',
   formula:'Season total box outs',
   min:'Display only.'},

  // ─── METRICS ─────────────────────────────────────────────────────────────
  {cat:'metrics',sub:'Overall',name:'BPM (computed)',type:'metric',norm:'lg',
   formula:'−2.611 + 0.318×AST% + 0.135×REB%×3 + 1.064×(TS%−0.5)×USG%/25 + 0.295×STL% + 0.396×BLK% − 0.257×(TOV/poss) + pos_adj\npos_adj: G=0 / GF=−0.5 / F=−1.0 / FC=−1.5 / C=−2.0',
   min:'USG% > 0; TS% > 0.'},
  {cat:'metrics',sub:'Overall',name:'Net Rating',type:'metric',norm:'lg',
   formula:'Off Rating − Def Rating (on-court)',
   min:'1000 min.'},
  {cat:'metrics',sub:'Overall',name:'PIE',type:'metric',norm:'lg',
   formula:'(PTS+FGM+FTM−FGA−FTA+DREB+0.5×OREB+AST+STL+0.5×BLK−PF−TOV) / game totals',
   min:'1000 min.'},
  {cat:'metrics',sub:'External',name:'Net Points / 100',type:'metric',norm:'lg',
   formula:'Luck-adjusted on/off net rating per 100 poss (ESPN Analytics). Off/Def split available.',
   min:'Available all seasons.'},
  {cat:'metrics',sub:'External',name:'DARKO DPM',type:'metric',norm:'lg',
   formula:'Bayesian model: box score priors + RAPM. Off/Def/Box components. (darko.app)',
   min:'2025-26 season onwards only.'},
  {cat:'metrics',sub:'External',name:'LEBRON',type:'metric',norm:'lg',
   formula:'boxPIPM + luck-adjusted RAPM + offensive archetypes. Off/Def split available. (BBall Index)',
   min:'2025-26 season onwards only.'},
  {cat:'metrics',sub:'External',name:'WAR',type:'metric',norm:'lg',
   formula:'LEBRON / league wins-per-point constant (~2.7)',
   min:'2025-26 season onwards only.'},
];

const catColors={scoring:'cat-scoring',playmaking:'cat-playmaking',defense:'cat-defense',hustle:'cat-hustle',metrics:'cat-metrics'};
const catLabels={scoring:'Scoring',playmaking:'Playmaking',defense:'Defense',hustle:'Hustle',metrics:'Metrics'};
let activeCat='all',activeNorm=null,activeType=null,searchVal='';

function normTag(n){return n==='pos'?'<span class="tag tag-pos">Position</span>':'<span class="tag tag-lg">League</span>';}
function typeTag(t){return t==='composite'?'<span class="tag tag-comp">Composite</span>':'<span class="tag tag-raw">Raw</span>';}

function render(){
  const q=searchVal.toLowerCase();
  const rows=ROWS.filter(r=>{
    if(activeCat!=='all'&&r.cat!==activeCat)return false;
    if(activeNorm&&r.norm!==activeNorm)return false;
    if(activeType&&r.type!==activeType)return false;
    if(q&&![r.name,r.sub,r.formula,r.min].some(s=>s.toLowerCase().includes(q)))return false;
    return true;
  });
  document.getElementById('count').textContent=rows.length+' stats';
  document.getElementById('tbody').innerHTML=rows.map(r=>`
    <tr class="${r.type==='composite'?'composite':''}">
      <td><span class="cat-badge ${catColors[r.cat]}">${catLabels[r.cat]}</span></td>
      <td><span class="sub-text">${r.sub}</span></td>
      <td><span class="stat-name">${r.name}</span><br>${typeTag(r.type)}</td>
      <td><span class="formula">${r.formula.replace(/\n/g,'<br>')}</span></td>
      <td><span class="min-req">${r.min}</span></td>
      <td>${normTag(r.norm)}</td>
    </tr>`).join('');
}

document.querySelectorAll('.pill[data-cat]').forEach(b=>b.addEventListener('click',()=>{
  activeCat=b.dataset.cat; activeNorm=null; activeType=null;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  b.classList.add('active'); render();
}));
document.querySelectorAll('.pill[data-norm]').forEach(b=>b.addEventListener('click',()=>{
  const v=b.dataset.norm;
  if(activeNorm===v){activeNorm=null;b.classList.remove('active');}
  else{activeNorm=v;document.querySelectorAll('.pill[data-norm]').forEach(p=>p.classList.remove('active'));b.classList.add('active');}
  render();
}));
document.querySelectorAll('.pill[data-type]').forEach(b=>b.addEventListener('click',()=>{
  const v=b.dataset.type;
  if(activeType===v){activeType=null;b.classList.remove('active');}
  else{activeType=v;document.querySelectorAll('.pill[data-type]').forEach(p=>p.classList.remove('active'));b.classList.add('active');}
  render();
}));
document.getElementById('search').addEventListener('input',e=>{searchVal=e.target.value;render();});
render();
</script>
</body>
</html>
